<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvanthanh | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #3ea6ff; /* Màu xanh giống YouTube */
            --hover-bg: #2d2d2d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Avatar */
        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid var(--accent-color);
            padding: 3px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .username {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Links */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid transparent;
        }

        .link-item i {
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
        }

        .link-item:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Dvanthanh" class="profile-pic">
        
        <h1>Dvanthanh</h1>
        <div class="username">@phamvanthanhtlouis</div>

        <div class="links-wrapper">
            <a href="https://facebook.com/phamvanthanhtlouis" class="link-item" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>

            <a href="https://tiktok.com/@phamvanthanhtlouis" class="link-item" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>

            <a href="https://instagram.com/phamvanthanhtlouis" class="link-item" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://youtube.com/@phamvanthanhtlouis" class="link-item" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>

            <a href="https://t.me/phamvanthanhtlouis" class="link-item" target="_blank">
                <i class="fab fa-telegram"></i> Telegram
            </a>
        </div>

        <div class="footer">
            © 2026 Dvanthanh. All rights reserved.
        </div>
    </div>

</body>
</html>
